<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="chat.css">
    <script src="chat.js"></script>
</head>
<body>
   <div>
        <form action="/register" method="POST" id="RegisterForm">
            <label for="Fullname">Full Name:</label>

            <input type="text" id="Fullname" placeholder="Full Name" required><br><br>
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Username" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Email" required><br><br>
            <label for="date-of-birth">Date of Birth:</label>
            <input type="date" id="date-of-birth" placeholder="Date of Birth" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="reg-password" placeholder="Password" required><br><br>
            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" placeholder="Confirm Password" required><br><br>
            <button type="submit" id="register-btn">Register</button><br><br>
            
        </form>
   </div> 
</body>
</html>
